name: CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'manifests/magic-number/kustomization.yaml'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/pglcorporate-dev/magic-number

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get SHA tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: apps/magic-number
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

      - name: Update kustomization.yaml
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.vars.outputs.sha_short }}|" manifests/magic-number/kustomization.yaml

      - name: Commit GitOps update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/magic-number/kustomization.yaml
          git commit -m "chore: deploy ${{ steps.vars.outputs.sha_short }}" || exit 0
          git push